name: Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Запрещаем параллельные деплои в main — последовательная очередь, иначе
# два workflow одновременно докер-компоузят и получаем race на VPS.
concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: false

jobs:
  check:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # gen:api-types нужен перед type-check — types/schema.d.ts генерится из schema.yaml.
      - name: Generate API types
        run: npm run gen:api-types

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      # SHA коммита — единственный тег. :latest умышленно не делаем, чтобы
      # rollback был тривиален (поменял IMAGE_TAG → pull/up).
      # GIT_SHA build-arg → OCI label на финальном образе → dc.sh autodetect.
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: GIT_SHA=${{ github.sha }}
          tags: ${{ secrets.REGISTRY_URL }}/rollstory-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Доставляем актуальный compose-файл и deploy/ (включая обновлённый
      # deploy.sh, который запустится следующим шагом).
      - name: Sync configs to VPS
        run: ./deploy/scripts/sync-configs.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

      # Логика pull/up — в deploy.sh на VPS. SHA передаём через ssh-env.
      - name: Deploy
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "IMAGE_TAG=${{ github.sha }} bash /opt/rollstory/frontend/deploy/scripts/deploy.sh"

      - name: Verify
        run: ./deploy/scripts/verify.sh "https://${{ secrets.DOMAIN }}/healthz"
