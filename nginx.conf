# Внутренний nginx prod-фронта. Слушает на 80 (внутри docker-сети rollstory-net,
# наружу не выходит). Внешний TLS-front — rollstory-proxy.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Локальный healthcheck для docker healthcheck и CI verify-шага.
    # Не зависит от backend-сервисов.
    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # SPA fallback — Vue Router в history mode.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем хэшированные ассеты Vite надолго; index.html — никогда.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Same-origin proxy на backend. rollstory-server в той же docker-сети,
    # резолвится по container_name. Запросы из браузера идут на /v1/... без CORS.
    location /v1/ {
        proxy_pass http://rollstory-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
