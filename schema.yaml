openapi: 3.0.0
info:
  version: 0.0.1
  title: RollStory Backend

servers:
  - url: https://api.rollstory.org/v1
    description: Production

paths:
  /db/campaign:
    post:
      summary: Создание кампании
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Успешное создание игры
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCampaignResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaigns:
    get:
      summary: Получение списка кампаний пользователя
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
      responses:
        "200":
          description: Список кампаний
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCampaignsResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}:
    delete:
      summary: Удаление кампании
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "204":
          description: Кампания успешно удалена
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет прав на удаление
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Кампания не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/relation:
    post:
      summary: Создание связи между персонажами
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRelationRequest"
      responses:
        "201":
          description: Связь успешно создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCharacterRelationResponse"
        "400":
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Персонаж не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Связь уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Удаление связи между персонажами
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteCharacterRelationRequest"
      responses:
        "204":
          description: Связь успешно удалена
        "400":
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/{characterId}:
    get:
      summary: Получение детальной информации о персонаже
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/CharacterId"
      responses:
        "200":
          description: Детальная информация о персонаже
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterDetailResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Персонаж не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      summary: Редактирование персонажа (с теми же правилами, что при создании)
      description: >
        Полная замена данных персонажа (только владелец кампании). В отличие от
        мастера создания — без сессии и шагов: передаётся вся спека сразу и
        проходит те же правила 5e, что при создании.


        Тело — UpdateCharacterRequest, передаётся целиком:

        - baseStats — БАЗОВЫЕ характеристики ДО применения ASI (point-buy: 8–15,
          ровно 27 очков). На сервере ASI применяется поверх, и пересчитываются
          модификаторы, HP, КД (AC) и инициатива.

        - asi — распределение ASI (валидируется по классу и уровню).

        - proficiencyChoices — владения в пределах лимитов класса.

        - raceIndex / classIndex — должны существовать в справочнике 5e.

        - tags, description, avatar_link — метаданные (avatar_link — URL из
          POST /files/upload?kind=character).


        Неизменяемое: campaignId, created_by и флаг is_npc сохраняются.

        Ответ — CharacterDetailResponse (персонаж + связи), как у GET.
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/CharacterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterRequest"
      responses:
        "200":
          description: Персонаж обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character:
    get:
      summary: Получение списка персонажей кампании
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Список персонажей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCharactersResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/signin:
    post:
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "201":
          description: Успешная регистрация пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigninResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      summary: Обновление jwt пары
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/X-Device-Id"
      responses:
        "200":
          description: Успешный ответ с JWT токенами
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      summary: Логин
      parameters:
        - $ref: "#/components/parameters/X-Device-Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный ответ с JWT токенами
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/verify-email:
    get:
      summary: Подтверждение email по ссылке из письма
      description: >
        Публичный эндпоинт. Принимает одноразовый токен из письма
        подтверждения, активирует пользователя и редиректит на UI.


        На успех: 302 на verify_email.success_url.

        На ошибку: 302 на verify_email.error_url?reason=<code>, где code —
        одно из: empty, not_found, used, expired, internal.
      tags:
        - Auth
      parameters:
        - in: query
          name: token
          required: true
          description: Сырой токен подтверждения email
          schema:
            type: string
      responses:
        "302":
          description: Редирект на UI (успех или ошибка с reason в query)
          headers:
            Location:
              schema:
                type: string
              description: URL для редиректа
        "500":
          $ref: "#/components/responses/InternalServerError"

  # hc - healthcheck
  /hc/ping:
    get:
      summary: Проверка готовности сервиса к запуску
      tags:
        - Test
      responses:
        "200":
          description: Сервис успешно запустился
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /hc/ready:
    get:
      summary: Проверка работоспособности сервиса
      tags:
        - Test
      responses:
        "200":
          description: Сервис работает штатно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /db/campaign/{campaignId}/character/create/start:
    post:
      summary: Начало создания персонажа
      description: >
        Старт пошагового мастера создания персонажа (только владелец кампании).


        Порядок шагов (каждый возвращает sessionId и следующий шаг):

        1. POST .../create/start — начало, отдаёт sessionId, characterId и
           справочники (доступные расы/классы).

        2. POST .../create/basic_info — имя, описание, раса, класс, уровень.

        3. POST .../create/point_buy — базовые характеристики по системе
           point-buy (8–15, ровно 27 очков).

        4. POST .../create/asi — распределение ASI (по классу и уровню;
           каждый бонус = 2 очка: +2 в одну или +1 в две характеристики).

        5. POST .../create/proficiencies — выбор владений в пределах лимитов класса.

        6. POST .../create/complete — финализация: персонаж сохраняется в БД.

        Откатиться на шаг назад можно через POST .../create/rewind.


        Аватар: characterId выдаётся уже на этом шаге, поэтому изображение
        можно загрузить ещё в процессе создания —
        POST /files/upload?campaign_id=...&kind=character&character_id=...
        получить URL и передать его в complete (avatar_link).
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCharacterCreationRequest"
      responses:
        "200":
          description: Успешное начало создания персонажа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCharacterCreationResponse"
        "400":
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/basic_info:
    post:
      summary: Сохранение базовой информации персонажа
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BasicInfoRequest"
      responses:
        "200":
          description: Базовая информация сохранена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicInfoResponse"
        "400":
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/point_buy:
    post:
      summary: Сохранение распределения характеристик по системе Point Buy
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointBuyRequest"
      responses:
        "200":
          description: Характеристики успешно сохранены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointBuyResponse"
        "400":
          description: Неверное распределение очков
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Доступ запрещен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/asi:
    post:
      summary: Распределение ASI (Ability Score Improvements)
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ASIRequest"
      responses:
        "200":
          description: ASI успешно распределены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ASIResponse"
        "400":
          description: Неверное распределение ASI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/proficiencies:
    post:
      summary: Выбор владений (proficiencies)
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProficienciesRequest"
      responses:
        "200":
          description: Владения успешно выбраны
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProficienciesResponse"
        "400":
          description: Неверный выбор владений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/rewind:
    post:
      summary: Откат на предыдущий шаг создания персонажа
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewindStepRequest"
      responses:
        "204":
          description: Шаг успешно откатен
        "400":
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/character/create/complete:
    post:
      summary: Завершение создания персонажа
      description: >
        Финальный шаг мастера: данные сессии собираются в персонажа и
        сохраняются в БД. Возвращает characterId (тот же, что выдан на start).


        avatar_link — опционально: URL изображения, загруженного во время
        создания через POST /files/upload?kind=character. Если не передан,
        персонаж создаётся без аватара (его можно добавить позже через PATCH).
      tags:
        - Character
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - $ref: "#/components/parameters/X-User-Id"
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteCharacterRequest"
      responses:
        "201":
          description: Персонаж успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteCharacterResponse"
        "400":
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /files/upload:
    post:
      summary: Загрузка изображения в S3
      parameters:
        - $ref: "#/components/parameters/Authorization"
        - in: query
          name: campaign_id
          required: true
          description: Идентификатор кампании
          schema:
            $ref: "#/components/schemas/UUID"
        - in: query
          name: kind
          required: true
          description: Тип сущности, для которой грузится файл
          schema:
            type: string
            enum: [location, character]
        - in: query
          name: location_id
          required: false
          description: Обязателен при kind=location
          schema:
            $ref: "#/components/schemas/UUID"
        - in: query
          name: character_id
          required: false
          description: Обязателен при kind=character
          schema:
            $ref: "#/components/schemas/UUID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Файл загружен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadFileResponse"
        "400":
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Нет доступа к кампании
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Файл превышает лимит
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: Неподдерживаемый тип файла
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /db/campaign/{campaignId}/location:
    post:
