components:
  # GENERIC RESPONSES (ERRORS, etc...)
  responses:
    ServiceUnavailable:
      description: Сервис недоступен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Непредвиденная внутренняя ошибка сервера.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Нет прав
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Конфликт состояния
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # GENERIC HEADERS
  parameters:
    X-User-Id:
      in: header
      name: X-User-Id
      description: Идентификатор пользователя (UUID)
      required: true
      schema:
        $ref: "#/components/schemas/UUID"
    Authorization:
      in: header
      name: Authorization
      description: Заголовок авторизации с Bearer токеном
      required: true
      schema:
        type: string
        example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    X-Device-Id:
      in: header
      name: X-Device-Id
      description: Уникальный идентификатор устройства (UUID)
      required: true
      schema:
        $ref: "#/components/schemas/UUID"
    CampaignId:
      in: path
      name: campaignId
      required: true
      description: Идентификатор кампании
      schema:
        $ref: "#/components/schemas/UUID"
    CharacterId:
      in: path
      name: characterId
      required: true
      description: Идентификатор персонажа
      schema:
        $ref: "#/components/schemas/UUID"
    LocationId:
      in: path
      name: locationId
      required: true
      description: Идентификатор локации
      schema:
        $ref: "#/components/schemas/UUID"
    QuestId:
      in: path
      name: questId
      required: true
      description: Идентификатор квеста
      schema:
        $ref: "#/components/schemas/UUID"

  schemas:
    UUID:
      type: string
      format: uuid
      pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"

    # Specific HTTP Responses
    OkResponse:
      type: object
      description: Успешный ответ, без наполнения
      required:
        - ok
      properties:
        ok:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Internal server error"

    UploadFileResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Публичный URL загруженного файла

    # REQUESTS
    CreateCampaignRequest:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          description: Название кампании
        description:
          type: string
          description: Описание кампании

    SigninRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email пользователя; основной логин и адрес для письма с подтверждением
        password:
          type: string
          description: Пароль пользователя
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email пользователя (логин)
        password:
          type: string
          description: Пароль пользователя
          format: password

    # RESPONSE
    CreateCampaignResponse:
      type: object
      required:
        - campaignId
      properties:
        campaignId:
          $ref: "#/components/schemas/UUID"

    SigninResponse:
      type: object
      required:
        - userId
      properties:
        userId:
          $ref: "#/components/schemas/UUID"
        verification_token:
          type: string
          description: >
            Сырой токен подтверждения email. Возвращается ВРЕМЕННО, пока не
            подключена реальная отправка письма (issue #29). После подключения
            SMTP это поле будет удалено из ответа.

    LoginResponse:
      type: object
      required:
        - userId
        - accessToken
        - refreshToken
      properties:
        userId:
          $ref: "#/components/schemas/UUID"
        accessToken:
          type: string
          description: access jwt token
        refreshToken:
          type: string
          description: refresh jwt token

    CampaignItem:
      type: object
      required:
        - id
        - title
        - description
        - createdAt
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        title:
          type: string
          description: Название кампании
        description:
          type: string
          description: Описание кампании
        createdAt:
          type: string
          format: date-time
          description: Дата создания

    ListCampaignsResponse:
      type: object
      required:
        - campaigns
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignItem"

    ListCharactersResponse:
      type: object
      required:
        - characters
      properties:
        characters:
          type: array
          items:
            $ref: "#/components/schemas/CharacterItem"

    CharacterItem:
      type: object
      required:
        - id
        - name
        - race
        - class
        - level
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
        race:
          type: string
        class:
          type: string
        level:
          type: integer

    CharacterDetailResponse:
      type: object
      required:
        - id
        - campaignId
        - isNpc
        - name
        - race
        - class
        - level
        - strength
        - dexterity
        - constitution
        - intelligence
        - wisdom
        - charisma
        - armorClass
        - initiative
        - speed
        - hitPoints
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        campaignId:
          $ref: "#/components/schemas/UUID"
        isNpc:
          type: boolean
        name:
          type: string
        race:
          type: string
        class:
          type: string
        level:
          type: integer
        avatarLink:
          type: string
        description:
          type: string
        strength:
          $ref: "#/components/schemas/StatDetail"
        dexterity:
          $ref: "#/components/schemas/StatDetail"
        constitution:
          $ref: "#/components/schemas/StatDetail"
        intelligence:
          $ref: "#/components/schemas/StatDetail"
        wisdom:
          $ref: "#/components/schemas/StatDetail"
        charisma:
          $ref: "#/components/schemas/StatDetail"
        skillIndexes:
          type: array
          items:
            type: string
        armorClass:
          type: integer
        initiative:
          type: integer
        speed:
          type: integer
        hitPoints:
          type: integer
        tags:
          type: array
          items:
            type: string
        createdBy:
          $ref: "#/components/schemas/UUID"
        relations:
          type: array
          items:
            $ref: "#/components/schemas/CharacterRelation"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CharacterRelation:
      type: object
      required:
        - id
        - connectedCharacterId
        - relationship
        - createdAt
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        connectedCharacterId:
          $ref: "#/components/schemas/UUID"
        relationship:
          type: string
        createdAt:
          type: string
          format: date-time

    StatDetail:
      type: object
      required:
        - value
        - modificator
      properties:
        value:
          type: integer
        modificator:
          type: integer

    # CHARACTER CREATION
    StartCharacterCreationRequest:
      type: object
      required:
        - locale
      properties:
        locale:
          type: string
          description: Язык локализации (ru, en)
          enum: [ru, en]

    BasicInfoRequest:
      type: object
      required:
        - sessionId
        - name
        - raceIndex
        - classIndex
        - level
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          description: Имя персонажа
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Описание персонажа (предыстория)
          maxLength: 2000
        raceIndex:
          type: string
          description: Индекс выбранной расы
        classIndex:
          type: string
          description: Индекс выбранного класса
        level:
          type: integer
          description: Уровень персонажа
          minimum: 1
          maximum: 20

    BasicInfoResponse:
      type: object
      required:
        - sessionId
        - nextStep
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        nextStep:
          type: string
          description: Следующий шаг создания персонажа

    PointBuyRequest:
      type: object
      required:
        - sessionId
        - baseStats
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        baseStats:
          $ref: "#/components/schemas/Stats"

    PointBuyResponse:
      type: object
      required:
        - sessionId
        - nextStep
        - totalAsiPoints
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        nextStep:
          type: string
          description: Следующий шаг создания персонажа
        totalAsiPoints:
          type: integer
          description: Общее количество ASI очков для распределения (0 если ASI пропущен)
        proficiencyChoices:
          type: array
          items:
            $ref: "#/components/schemas/ProficiencyChoice"
          description: Доступные выборы владений (заполняется при пропуске ASI)

    ASIRequest:
      type: object
      required:
        - sessionId
        - asi
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        asi:
          type: array
          items:
            $ref: "#/components/schemas/ASIAllocation"
          description: Распределение ASI очков

    ASIResponse:
      type: object
      required:
        - sessionId
        - nextStep
        - proficiencyChoices
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        nextStep:
          type: string
          description: Следующий шаг создания персонажа
        proficiencyChoices:
          type: array
          items:
            $ref: "#/components/schemas/ProficiencyChoice"

    ASIAllocation:
      type: object
      required:
        - statIndex
        - points
      properties:
        statIndex:
          type: string
          description: Индекс характеристики для улучшения
        points:
          type: integer
          description: Количество очков (+1 или +2)
          enum: [1, 2]

    ProficienciesRequest:
      type: object
      required:
        - sessionId
        - choices
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        choices:
          $ref: "#/components/schemas/ProficiencyChoicesData"

    ProficienciesResponse:
      type: object
      required:
        - sessionId
        - nextStep
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        nextStep:
          type: string
          description: Следующий шаг создания персонажа

    ProficiencyChoicesData:
      type: object
      properties:
        skillIndexes:
          type: array
          items:
            type: string
          description: Индексы выбранных навыков
        toolIndexes:
          type: array
          items:
            type: string
          description: Индексы выбранных инструментов
        musicalInstrumentIndexes:
          type: array
          items:
            type: string
          description: Индексы выбранных музыкальных инструментов

    CreateCharacterRelationRequest:
      type: object
      required:
        - characterId
        - connectedCharacterId
        - relationship
      properties:
        characterId:
          $ref: "#/components/schemas/UUID"
        connectedCharacterId:
          $ref: "#/components/schemas/UUID"
        relationship:
          type: string
          description: Описание связи между персонажами

    CreateCharacterRelationResponse:
      type: object
      required:
        - id
        - characterId
        - connectedCharacterId
        - relationship
        - createdAt
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        characterId:
          $ref: "#/components/schemas/UUID"
        connectedCharacterId:
          $ref: "#/components/schemas/UUID"
        relationship:
          type: string
        createdAt:
          type: string
          format: date-time

    DeleteCharacterRelationRequest:
      type: object
      required:
        - characterId
        - connectedCharacterId
      properties:
        characterId:
          $ref: "#/components/schemas/UUID"
        connectedCharacterId:
          $ref: "#/components/schemas/UUID"

    RewindStepRequest:
      type: object
      required:
        - sessionId
        - targetStep
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        targetStep:
          type: string
          description: Шаг, на который нужно вернуться
          enum: [basic_info, point_buy, asi, proficiency]

    CompleteCharacterRequest:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        avatar_link:
          type: string
          description: URL аватара, загруженного во время создания (опционально)

    UpdateCharacterRequest:
      type: object
      description: >
        Полная спека персонажа. Прогоняется через те же правила 5e, что и
        при создании (point-buy, ASI по классу/уровню, лимиты proficiency,
        существование расы/класса). baseStats — БАЗОВЫЕ значения до ASI.
      required:
        - name
        - raceIndex
        - classIndex
        - level
        - baseStats
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        raceIndex:
          type: string
        classIndex:
          type: string
        level:
          type: integer
          minimum: 1
          maximum: 20
        baseStats:
          $ref: "#/components/schemas/Stats"
        asi:
          type: array
          items:
            $ref: "#/components/schemas/ASIAllocation"
        proficiencyChoices:
          $ref: "#/components/schemas/ProficiencyChoicesData"
        tags:
          type: array
          items:
            type: string
        avatar_link:
          type: string

    CompleteCharacterResponse:
      type: object
      required:
        - characterId
      properties:
        characterId:
          $ref: "#/components/schemas/UUID"

    Stats:
      type: object
      required:
        - strength
        - dexterity
        - constitution
        - intelligence
        - wisdom
        - charisma
      properties:
        strength:
          type: integer
          minimum: 8
          maximum: 15
          description: Сила
        dexterity:
          type: integer
          minimum: 8
          maximum: 15
          description: Ловкость
        constitution:
          type: integer
          minimum: 8
          maximum: 15
          description: Телосложение
        intelligence:
          type: integer
          minimum: 8
          maximum: 15
          description: Интеллект
        wisdom:
          type: integer
          minimum: 8
          maximum: 15
          description: Мудрость
        charisma:
          type: integer
          minimum: 8
          maximum: 15
          description: Харизма

    StartCharacterCreationResponse:
      type: object
      required:
        - sessionId
        - characterId
        - nextStep
        - availableRaces
        - availableClasses
        - dictionary
      properties:
        sessionId:
          $ref: "#/components/schemas/UUID"
        characterId:
          $ref: "#/components/schemas/UUID"
        nextStep:
          type: string
          description: Следующий шаг создания персонажа
        availableRaces:
          type: array
          items:
            $ref: "#/components/schemas/RaceCompact"
        availableClasses:
          type: array
          items:
            $ref: "#/components/schemas/ClassCompact"
        dictionary:
          $ref: "#/components/schemas/Dictionary"

    # Словарь с детальной информацией по индексам
    Dictionary:
      type: object
      properties:
        languages:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LanguageDetails"
        abilityScores:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AbilityScoreDetails"
        traits:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TraitDetails"
        proficiencies:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ProficiencyDetails"
        equipment:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/EquipmentDetails"
        subclasses:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SubclassDetails"
        subraces:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SubraceDetails"

    # Детали для словаря
    LanguageDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    AbilityScoreDetails:
      type: object
      required:
        - name
        - shortName
      properties:
        name:
          type: string
        shortName:
          type: string
        description:
          type: string

    TraitDetails:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        proficiencies:
          type: array
          items:
            type: string
          description: Индексы proficiencies

    ProficiencyDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        type:
          type: string

    EquipmentDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    SubclassDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    SubraceDetails:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        abilityBonuses:
          type: array
          items:
            $ref: "#/components/schemas/AbilityBonusCompact"
        traits:
          type: array
          items:
            type: string
          description: Индексы traits

    # Компактные структуры (ссылки по индексам)
    RaceCompact:
      type: object
      required:
        - index
        - name
        - description
        - speed
        - size
      properties:
        index:
          type: string
        name:
          type: string
        description:
          type: string
        alignment:
          type: string
        age:
          type: string
        size:
          type: string
        sizeDescription:
          type: string
        speed:
          type: integer
        languages:
          type: array
          items:
            type: string
          description: Индексы языков (детали в dictionary.languages)
        optionalLanguages:
          type: array
          items:
            type: string
          description: Индексы опциональных языков
        abilityBonuses:
          type: array
          items:
            $ref: "#/components/schemas/AbilityBonusCompact"
        optionalAbilityBonuses:
          type: array
          items:
            $ref: "#/components/schemas/AbilityBonusCompact"
        traits:
          type: array
          items:
            type: string
          description: Индексы черт (детали в dictionary.traits)
        subraces:
          type: array
          items:
            type: string
          description: Индексы подрас (детали в dictionary.subraces)

    AbilityBonusCompact:
      type: object
      required:
        - abilityIndex
        - value
      properties:
        abilityIndex:
          type: string
          description: Индекс характеристики (детали в dictionary.abilityScores)
        value:
          type: integer

    ClassCompact:
      type: object
      required:
        - index
        - name
        - hitDie
      properties:
        index:
          type: string
        name:
          type: string
        hitDie:
          type: integer
        defaultProficiencies:
          type: array
          items:
            type: string
          description: Индексы владений (детали в dictionary.proficiencies)
        optionalProficiencies:
          type: array
          items:
            type: string
          description: Индексы опциональных владений
        savingThrows:
          type: array
          items:
            type: string
          description: Индексы характеристик для спасбросков
        defaultEquipment:
          type: array
          items:
            $ref: "#/components/schemas/EquipmentCompact"
        optionalEquipment:
          type: array
          items:
            $ref: "#/components/schemas/EquipmentCompact"
        subclasses:
          type: array
          items:
            type: string
          description: Индексы подклассов (детали в dictionary.subclasses)

    EquipmentCompact:
      type: object
      required:
        - equipmentIndex
        - quantity
      properties:
        equipmentIndex:
          type: string
          description: Индекс снаряжения (детали в dictionary.equipment)
        quantity:
          type: integer

    ProficiencyChoice:
      type: object
      required:
        - desc
        - choose
        - type
        - from
      properties:
        desc:
          type: string
          description: Описание выбора
        choose:
          type: integer
          description: Количество элементов для выбора
        type:
          type: string
          description: Тип выбора
        from:
          $ref: "#/components/schemas/OptionSet"

    OptionSet:
      type: object
      required:
        - optionSetType
      properties:
        optionSetType:
          type: string
          description: Тип набора опций
        options:
          type: array
          items:
            $ref: "#/components/schemas/ProficiencyOption"
        equipmentCategory:
          type: object
          properties:
            index:
              type: string
            name:
              type: string

    ProficiencyOption:
      type: object
      required:
        - optionType
      properties:
        optionType:
          type: string
          description: Тип опции (reference, choice, counted_reference)
        item:
          type: object
          properties:
            index:
              type: string
            name:
              type: string
        of:
          type: object
          properties:
            index:
              type: string
            name:
              type: string
        choice:
          $ref: "#/components/schemas/ProficiencyChoice"
        count:
          type: integer

    # ── Locations ──────────────────────────────────────────────────────────
    CreateLocationRequest:
      type: object
      required: [title, x, y]
      properties:
        title:
          type: string
        description:
          type: string
        image_url:
          type: string
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string

    UpdateLocationRequest:
      type: object
      description: PATCH-семантика — переданы только поля, которые надо изменить.
      properties:
        title:
          type: string
        description:
          type: string
        image_url:
          type: string
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string

    LocationResponse:
      type: object
      required: [id, campaign_id, title, x, y, created_by, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        campaign_id:
          $ref: "#/components/schemas/UUID"
        title:
          type: string
        description:
          type: string
        image_url:
          type: string
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string
        created_by:
          $ref: "#/components/schemas/UUID"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LocationDetailResponse:
      type: object
      required: [location, character_ids, quest_ids]
      properties:
        location:
          $ref: "#/components/schemas/LocationResponse"
        character_ids:
          type: array
          items:
            $ref: "#/components/schemas/UUID"
        quest_ids:
          type: array
          items:
            $ref: "#/components/schemas/UUID"

    ListLocationsResponse:
      type: object
      required: [locations]
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationResponse"

    CreateQuestRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    UpdateQuestRequest:
      type: object
      description: PATCH-семантика — переданы только поля, которые надо изменить.
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    QuestResponse:
      type: object
      required: [id, campaign_id, title, description, is_active, created_at]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        campaign_id:
          $ref: "#/components/schemas/UUID"
        title:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    QuestDetailResponse:
      type: object
      required: [quest, location_ids, character_ids, npc_ids]
      properties:
        quest:
          $ref: "#/components/schemas/QuestResponse"
        location_ids:
          type: array
          items:
            $ref: "#/components/schemas/UUID"
        character_ids:
          type: array
          description: Игровые персонажи (is_npc = false)
          items:
            $ref: "#/components/schemas/UUID"
        npc_ids:
          type: array
          description: НПС (is_npc = true)
          items:
            $ref: "#/components/schemas/UUID"

    ListQuestsResponse:
      type: object
      required: [quests]
      properties:
        quests:
          type: array
          items:
            $ref: "#/components/schemas/QuestResponse"